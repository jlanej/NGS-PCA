name: Integration Test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  highcov-setup-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate 1000G setup manifest sample count
        working-directory: example/1000G_highcov
        run: |
          set -euo pipefail
          TEST_WORK="${RUNNER_TEMP}/highcov_setup_test"
          MIN_MANIFEST_SAMPLES=3000
          EXPECTED_MANIFEST_SAMPLES=3202
          mkdir -p "${TEST_WORK}/reference"
          # Empty placeholders are sufficient here because this test targets only
          # manifest generation/validation in step [4/5], not container/reference I/O.
          touch "${TEST_WORK}/ngs-pca.sif" "${TEST_WORK}/reference/ref.fa" "${TEST_WORK}/igsr_sample_panel.ped"

          INDEX_FILE_PATH="${TEST_WORK}/1000genomes.high_coverage.GRCh38DH.alignment.index"
          python3 - "${INDEX_FILE_PATH}" "${EXPECTED_MANIFEST_SAMPLES}" <<'PY'
          import sys
          from pathlib import Path

          out = Path(sys.argv[1])
          expected_samples = int(sys.argv[2])
          md5_length = 32
          # Synthetic placeholder population code for fixture URLs.
          pop_code = "TST"
          out.parent.mkdir(parents=True, exist_ok=True)
          with out.open("w", encoding="utf-8") as f:
              for i in range(1, expected_samples + 1):
                  # Synthetic IDs are sufficient for this test because 00_setup.sh
                  # validates structure/count, not membership in IGSR sample panels.
                  sample = f"HG{i:05d}"
                  # Keep realistic sample IDs/paths so the generated manifest matches
                  # the parser assumptions used by 00_setup.sh.
                  base = (
                      "ftp://ftp.1000genomes.ebi.ac.uk/vol1/ftp/data_collections/"
                      f"1000_genomes_project/data/{pop_code}/{sample}/high_cov_alignment/{sample}"
                  )
                  cram = f"{base}.alt_bwamem_GRCh38DH.20150917.{pop_code}.high_coverage.cram"
                  crai = f"{cram}.crai"
                  bas = f"{base}.bam.bas"
                  # MD5 and placeholder columns are not validated by 00_setup.sh;
                  # they are included to preserve index column structure.
                  f.write(f"{cram}\t{'a'*md5_length}\t{crai}\t.\t{bas}\t.\n")
          PY

          WORK_DIR="${TEST_WORK}" \
          SIF_IMAGE="${TEST_WORK}/ngs-pca.sif" \
          REF_DIR="${TEST_WORK}/reference" \
          REF_FASTA="${TEST_WORK}/reference/ref.fa" \
          INDEX_FILE="${INDEX_FILE_PATH}" \
          MANIFEST="${TEST_WORK}/manifest.tsv" \
          PANEL_FILE="${TEST_WORK}/igsr_sample_panel.ped" \
          MIN_MANIFEST_SAMPLES="${MIN_MANIFEST_SAMPLES}" \
          EXPECTED_MANIFEST_SAMPLES="${EXPECTED_MANIFEST_SAMPLES}" \
          bash 00_setup.sh

          SAMPLE_COUNT=$(tail -n +2 "${TEST_WORK}/manifest.tsv" | wc -l)
          echo "Manifest sample count: ${SAMPLE_COUNT}"
          if (( SAMPLE_COUNT < MIN_MANIFEST_SAMPLES )); then
            echo "::error::Manifest has only ${SAMPLE_COUNT} samples (minimum expected: ${MIN_MANIFEST_SAMPLES})."
            exit 1
          fi

  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Build with Maven
        working-directory: ngspca
        run: mvn -B package --file pom.xml

      - name: Run NGS-PCA (UNIFORM distribution)
        working-directory: example
        run: |
          mkdir -p test_output
          java -jar ../ngspca/target/ngspca-0.02-SNAPSHOT.jar \
            -input input.files.txt \
            -outputDir test_output/ \
            -numPC 2 \
            -sampleEvery 0 \
            -iters 10 \
            -randomSeed 42 \
            -oversample 2 \
            -distribution UNIFORM \
            -bedExclude ../resources/GRCh38/ngs_pca_exclude.sv_blacklist.map.kmer.50.1.0.dgv.gsd.sorted.merge.bed.gz

      - name: Run NGS-PCA (GAUSSIAN distribution)
        working-directory: example
        run: |
          mkdir -p test_output_gaussian
          java -jar ../ngspca/target/ngspca-0.02-SNAPSHOT.jar \
            -input input.files.txt \
            -outputDir test_output_gaussian/ \
            -numPC 2 \
            -sampleEvery 0 \
            -iters 10 \
            -randomSeed 42 \
            -oversample 2 \
            -distribution GAUSSIAN \
            -bedExclude ../resources/GRCh38/ngs_pca_exclude.sv_blacklist.map.kmer.50.1.0.dgv.gsd.sorted.merge.bed.gz

      - name: Generate UNIFORM vs GAUSSIAN distribution comparison
        working-directory: example
        run: |
          python3 compare_distributions.py \
            test_output/ \
            test_output_gaussian/ \
            test_output/distribution_comparison.txt

      - name: Verify output MD5 checksums
        working-directory: example
        run: |
          echo "Comparing output files against expected checksums..."
          FAILED=0
          CHECKED=0

          while IFS='  ' read -r expected_md5 filepath; do
            # Skip empty lines
            [ -z "$expected_md5" ] && continue

            # Check svd.* output files and distribution_comparison.txt
            case "$filepath" in
              ./exampleOutput_1000G_chr1/svd.*|./exampleOutput_1000G_chr1/distribution_comparison.txt)
                CHECKED=$((CHECKED + 1))
                filename=$(basename "$filepath")
                test_file="./test_output/$filename"

                if [ ! -f "$test_file" ]; then
                  echo "MISSING: $test_file"
                  FAILED=1
                  continue
                fi

                actual_md5=$(md5sum "$test_file" | awk '{print $1}')
                if [ "$actual_md5" = "$expected_md5" ]; then
                  echo "PASS: $filename ($actual_md5)"
                else
                  echo "FAIL: $filename (expected: $expected_md5, got: $actual_md5)"
                  FAILED=1
                fi
                ;;
            esac
          done < 1000G.chr1.md5

          if [ "$CHECKED" -eq 0 ]; then
            echo "::error::No output files were checked - verify MD5 file and output path patterns"
            exit 1
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::MD5 checksum verification failed"
            exit 1
          fi

          echo "All $CHECKED output checksums match expected values."
