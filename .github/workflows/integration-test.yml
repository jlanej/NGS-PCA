name: Integration Test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  highcov-setup-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download real IGSR NYGC 30x sequence indexes
        working-directory: example/1000G_highcov
        run: |
          set -euo pipefail
          TEST_WORK="${RUNNER_TEMP}/highcov_setup_test"
          mkdir -p "${TEST_WORK}/reference"
          # Empty placeholders — this test targets only manifest generation (step 4/5)
          touch "${TEST_WORK}/ngs-pca.sif" "${TEST_WORK}/reference/ref.fa" "${TEST_WORK}/igsr_sample_panel.ped"

          # Download the real NYGC 30x sequence indexes from EBI FTP
          echo "Downloading 2504-sample sequence index..."
          curl -sSL -o "${TEST_WORK}/1000G_2504_high_coverage.sequence.index" \
            "ftp://ftp.1000genomes.ebi.ac.uk/vol1/ftp/data_collections/1000G_2504_high_coverage/1000G_2504_high_coverage.sequence.index"
          echo "Downloading 698-sample sequence index..."
          curl -sSL -o "${TEST_WORK}/1000G_698_related_high_coverage.sequence.index" \
            "ftp://ftp.1000genomes.ebi.ac.uk/vol1/ftp/data_collections/1000G_2504_high_coverage/1000G_698_related_high_coverage.sequence.index"

          # Run 00_setup.sh with real indexes
          WORK_DIR="${TEST_WORK}" \
          SIF_IMAGE="${TEST_WORK}/ngs-pca.sif" \
          REF_DIR="${TEST_WORK}/reference" \
          REF_FASTA="${TEST_WORK}/reference/ref.fa" \
          INDEX_FILE_2504="${TEST_WORK}/1000G_2504_high_coverage.sequence.index" \
          INDEX_FILE_698="${TEST_WORK}/1000G_698_related_high_coverage.sequence.index" \
          MANIFEST="${TEST_WORK}/manifest.tsv" \
          PANEL_FILE="${TEST_WORK}/igsr_sample_panel.ped" \
          MIN_MANIFEST_SAMPLES=3000 \
          EXPECTED_MANIFEST_SAMPLES=3202 \
          bash 00_setup.sh

          SAMPLE_COUNT=$(tail -n +2 "${TEST_WORK}/manifest.tsv" | wc -l)
          echo "Manifest sample count: ${SAMPLE_COUNT}"
          if (( SAMPLE_COUNT < 3000 )); then
            echo "::error::Manifest has only ${SAMPLE_COUNT} samples (minimum expected: 3000)."
            exit 1
          fi
          echo "Manifest validation passed (${SAMPLE_COUNT} samples)."

  mosdepth-coverage-summary-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test mosdepth coverage summary parsing
        working-directory: example/1000G_highcov
        run: |
          set -euo pipefail
          TEST_WORK="${RUNNER_TEMP}/cov_summary_test"
          mkdir -p "${TEST_WORK}/mosdepth_output" "${TEST_WORK}/qc_output"

          # ── Create synthetic mosdepth regions.bed.gz files ──
          # Each file has autosomal bins with known coverage values
          echo "=== Creating synthetic mosdepth regions data ==="

          # Sample A: coverage values 10,20,30,40,50 (mean=30, median=30, sd=15.81, IQR=20)
          {
            printf "chr1\t0\t1000\t10\n"
            printf "chr1\t1000\t2000\t20\n"
            printf "chr2\t0\t1000\t30\n"
            printf "chr2\t1000\t2000\t40\n"
            printf "chr3\t0\t1000\t50\n"
            printf "chrX\t0\t1000\t15\n"
          } | gzip > "${TEST_WORK}/mosdepth_output/sampleA.by1000.regions.bed.gz"

          # Sample B: uniform coverage of 25 across 4 bins
          {
            printf "chr1\t0\t1000\t25\n"
            printf "chr1\t1000\t2000\t25\n"
            printf "chr2\t0\t1000\t25\n"
            printf "chr2\t1000\t2000\t25\n"
          } | gzip > "${TEST_WORK}/mosdepth_output/sampleB.by1000.regions.bed.gz"

          # ── Run the coverage summary script ──
          echo "=== Running 03a_mosdepth_coverage_summary.sh ==="
          WORK_DIR="${TEST_WORK}" \
          MOSDEPTH_DIR="${TEST_WORK}/mosdepth_output" \
          QC_OUTPUT="${TEST_WORK}/qc_output" \
          bash 03a_mosdepth_coverage_summary.sh

          # ── Validate output ──
          OUT="${TEST_WORK}/qc_output/mosdepth_coverage_summary.tsv"
          if [[ ! -f "${OUT}" ]]; then
            echo "::error::Coverage summary output not found"
            exit 1
          fi

          echo "=== Validating coverage summary output ==="
          cat "${OUT}"

          # Check header
          HEADER=$(head -1 "${OUT}")
          EXPECTED_HEADER="SAMPLE_ID	MEAN_COV	MEDIAN_COV	SD_COV	MAD_COV	IQR_COV	HQ_MEAN_COV	HQ_MEDIAN_COV	HQ_SD_COV	HQ_MAD_COV	HQ_IQR_COV"
          if [[ "${HEADER}" != "${EXPECTED_HEADER}" ]]; then
            echo "::error::Header mismatch. Got: ${HEADER}"
            exit 1
          fi
          echo "PASS: Header matches expected format"

          # Check we got 2 samples
          NROWS=$(tail -n +2 "${OUT}" | wc -l)
          if (( NROWS != 2 )); then
            echo "::error::Expected 2 sample rows, got ${NROWS}"
            exit 1
          fi
          echo "PASS: Got ${NROWS} sample rows"

          # Validate sampleA values (5 autosomal bins: 10,20,30,40,50; chrX bin excluded)
          # Expected: mean=30, median=30, sd=15.8114 (sample SD), mad=10, iqr=20
          #   Q1 at position floor(n/4)+1=2 → 20, Q3 at position floor(3n/4)+1=4 → 40, IQR=20
          #   MAD = median of |10-30|=20,|20-30|=10,|30-30|=0,|40-30|=10,|50-30|=20 → sorted
          #         [0,10,10,20,20], median at pos 3 = 10
          SAMPLE_A=$(awk -F'\t' '$1 == "sampleA"' "${OUT}")
          if [[ -z "${SAMPLE_A}" ]]; then
            echo "::error::sampleA not found in output"
            exit 1
          fi
          MEAN_A=$(echo "${SAMPLE_A}" | cut -f2)
          MEDIAN_A=$(echo "${SAMPLE_A}" | cut -f3)
          SD_A=$(echo "${SAMPLE_A}" | cut -f4)
          MAD_A=$(echo "${SAMPLE_A}" | cut -f5)
          IQR_A=$(echo "${SAMPLE_A}" | cut -f6)
          echo "  sampleA: mean=${MEAN_A}, median=${MEDIAN_A}, sd=${SD_A}, mad=${MAD_A}, iqr=${IQR_A}"

          # Mean should be 30.0000 (chrX bin with 15.0 must be excluded — autosomal only)
          # If chrX were included: mean=(10+20+30+40+50+15)/6=27.5 ≠ 30
          if [[ "${MEAN_A}" != "30.0000" ]]; then
            echo "::error::sampleA mean expected 30.0000, got ${MEAN_A} (chrX bin may not be excluded)"
            exit 1
          fi
          echo "PASS: sampleA mean correct (chrX excluded)"

          # Median should be 30.0000
          if [[ "${MEDIAN_A}" != "30.0000" ]]; then
            echo "::error::sampleA median expected 30.0000, got ${MEDIAN_A}"
            exit 1
          fi
          echo "PASS: sampleA median correct"

          # SD should be 15.8114 (sample SD, divides by n-1=4)
          # sqrt(((10-30)^2+(20-30)^2+(30-30)^2+(40-30)^2+(50-30)^2)/4) = sqrt(250) = 15.8114
          if [[ "${SD_A}" != "15.8114" ]]; then
            echo "::error::sampleA SD expected 15.8114 (sample SD), got ${SD_A}"
            exit 1
          fi
          echo "PASS: sampleA SD correct (sample standard deviation)"

          # MAD should be 10.0000
          if [[ "${MAD_A}" != "10.0000" ]]; then
            echo "::error::sampleA MAD expected 10.0000, got ${MAD_A}"
            exit 1
          fi
          echo "PASS: sampleA MAD correct"

          # IQR should be 20.0000 (Q3=40 at pos 4, Q1=20 at pos 2; IQR=40-20=20)
          if [[ "${IQR_A}" != "20.0000" ]]; then
            echo "::error::sampleA IQR expected 20.0000, got ${IQR_A}"
            exit 1
          fi
          echo "PASS: sampleA IQR correct"

          # Validate sampleB values (4 bins all 25: mean=25, median=25, sd=0, mad=0, iqr=0)
          SAMPLE_B=$(awk -F'\t' '$1 == "sampleB"' "${OUT}")
          MEAN_B=$(echo "${SAMPLE_B}" | cut -f2)
          MEDIAN_B=$(echo "${SAMPLE_B}" | cut -f3)
          SD_B=$(echo "${SAMPLE_B}" | cut -f4)
          MAD_B=$(echo "${SAMPLE_B}" | cut -f5)
          IQR_B=$(echo "${SAMPLE_B}" | cut -f6)
          echo "  sampleB: mean=${MEAN_B}, median=${MEDIAN_B}, sd=${SD_B}, mad=${MAD_B}, iqr=${IQR_B}"
          if [[ "${MEAN_B}" != "25.0000" ]]; then
            echo "::error::sampleB mean expected 25.0000, got ${MEAN_B}"
            exit 1
          fi
          if [[ "${MEDIAN_B}" != "25.0000" ]]; then
            echo "::error::sampleB median expected 25.0000, got ${MEDIAN_B}"
            exit 1
          fi
          if [[ "${SD_B}" != "0.0000" ]]; then
            echo "::error::sampleB SD expected 0.0000, got ${SD_B}"
            exit 1
          fi
          if [[ "${MAD_B}" != "0.0000" ]]; then
            echo "::error::sampleB MAD expected 0.0000, got ${MAD_B}"
            exit 1
          fi
          if [[ "${IQR_B}" != "0.0000" ]]; then
            echo "::error::sampleB IQR expected 0.0000, got ${IQR_B}"
            exit 1
          fi
          echo "PASS: sampleB values correct (uniform coverage: SD=MAD=IQR=0)"

          echo ""
          echo "=== All mosdepth coverage summary tests passed ==="

      - name: Test QC table integration with coverage summary
        working-directory: example/1000G_highcov
        run: |
          set -euo pipefail
          TEST_WORK="${RUNNER_TEMP}/qc_integration_test"
          mkdir -p "${TEST_WORK}/mosdepth_output" "${TEST_WORK}/qc_output"

          # ── Create synthetic mosdepth summary and dist files ──
          printf "chrom\tlength\tbases\tmean\tmin\tmax\n" > "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.summary.txt"
          printf "chr1\t248956422\t7468692660\t30.00\t0\t100\n" >> "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.summary.txt"
          printf "chr2\t242193529\t7265805870\t30.00\t0\t100\n" >> "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.summary.txt"
          printf "chrX\t156040895\t4681226850\t15.00\t0\t100\n" >> "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.summary.txt"
          printf "chrY\t57227415\t286137075\t5.00\t0\t100\n" >> "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.summary.txt"
          printf "chrM\t16569\t828450\t50.00\t0\t100\n" >> "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.summary.txt"

          printf "total\t0\t1.0000\n" > "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.global.dist.txt"
          printf "total\t10\t0.9500\n" >> "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.global.dist.txt"
          printf "total\t20\t0.9000\n" >> "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.global.dist.txt"
          printf "total\t30\t0.5100\n" >> "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.global.dist.txt"
          printf "total\t31\t0.4900\n" >> "${TEST_WORK}/mosdepth_output/testSample.by1000.mosdepth.global.dist.txt"

          # ── Create synthetic coverage summary ──
          printf "SAMPLE_ID\tMEAN_COV\tMEDIAN_COV\tSD_COV\tMAD_COV\tIQR_COV\tHQ_MEAN_COV\tHQ_MEDIAN_COV\tHQ_SD_COV\tHQ_MAD_COV\tHQ_IQR_COV\n" > "${TEST_WORK}/qc_output/mosdepth_coverage_summary.tsv"
          printf "testSample\t30.0000\t30.0000\t5.1234\t3.4567\t7.8901\t29.0000\t29.0000\t4.5678\t2.3456\t6.7890\n" >> "${TEST_WORK}/qc_output/mosdepth_coverage_summary.tsv"

          # ── Run 03_collect_qc.sh ──
          echo "=== Running 03_collect_qc.sh ==="
          WORK_DIR="${TEST_WORK}" \
          MOSDEPTH_DIR="${TEST_WORK}/mosdepth_output" \
          QC_OUTPUT="${TEST_WORK}/qc_output" \
          PANEL_FILE="${TEST_WORK}/nonexistent_panel.ped" \
          MANIFEST="${TEST_WORK}/nonexistent_manifest.tsv" \
          bash 03_collect_qc.sh

          # ── Validate output ──
          OUT="${TEST_WORK}/qc_output/sample_qc.tsv"
          if [[ ! -f "${OUT}" ]]; then
            echo "::error::QC table output not found"
            exit 1
          fi

          echo "=== QC table output ==="
          cat "${OUT}"

          # ── Verify column structure ───────────────────────────────────────────
          HEADER=$(head -1 "${OUT}")

          # Verify all expected coverage/QC columns are present
          for col in MEAN_AUTOSOMAL_COV X_COV_RATIO Y_COV_RATIO INFERRED_SEX MITO_COV_RATIO \
                     MEDIAN_GENOME_COV PCT_GENOME_COV_10X PCT_GENOME_COV_20X \
                     SD_COV MAD_COV IQR_COV MEDIAN_BIN_COV \
                     HQ_MEDIAN_COV HQ_SD_COV HQ_MAD_COV HQ_IQR_COV MTDNA_CN; do
            if ! echo "${HEADER}" | grep -qw "${col}"; then
              echo "::error::Missing column ${col} in header"
              exit 1
            fi
          done
          echo "PASS: All expected QC columns present in header"

          # Verify the 18-column header order (before panel/manifest joins)
          # Columns must appear in this exact order: mosdepth summary → dist → cov variability → HQ+MTDNA_CN
          EXPECTED_HEADER=$(printf '%s\t' \
            SAMPLE_ID MEAN_AUTOSOMAL_COV X_COV_RATIO Y_COV_RATIO INFERRED_SEX MITO_COV_RATIO \
            MEDIAN_GENOME_COV PCT_GENOME_COV_10X PCT_GENOME_COV_20X \
            SD_COV MAD_COV IQR_COV MEDIAN_BIN_COV \
            HQ_MEDIAN_COV HQ_SD_COV HQ_MAD_COV HQ_IQR_COV MTDNA_CN \
            | sed 's/\t$//')
          if [[ "${HEADER}" != "${EXPECTED_HEADER}" ]]; then
            echo "::error::QC table header order mismatch."
            echo "  Expected: $(echo "${EXPECTED_HEADER}" | tr '\t' '|')"
            echo "  Got:      $(echo "${HEADER}" | tr '\t' '|')"
            exit 1
          fi
          echo "PASS: QC table header order correct (18 columns)"

          # Verify no BAS columns remain
          for col in TOTAL_BASES MAPPED_BASES DUPLICATE_READS PCT_DUPLICATE; do
            if echo "${HEADER}" | grep -q "${col}"; then
              echo "::error::BAS column ${col} still present in header"
              exit 1
            fi
          done
          echo "PASS: No BAS columns in header"

          # ── Verify computed metric values ─────────────────────────────────────
          # Column assignments (1-based):
          #  1=SAMPLE_ID  2=MEAN_AUTOSOMAL_COV  3=X_COV_RATIO  4=Y_COV_RATIO
          #  5=INFERRED_SEX  6=MITO_COV_RATIO  7=MEDIAN_GENOME_COV
          #  8=PCT_GENOME_COV_10X  9=PCT_GENOME_COV_20X
          # 10=SD_COV  11=MAD_COV  12=IQR_COV  13=MEDIAN_BIN_COV
          # 14=HQ_MEDIAN_COV  15=HQ_SD_COV  16=HQ_MAD_COV  17=HQ_IQR_COV
          # 18=MTDNA_CN
          DATA=$(awk -F'\t' 'NR==2' "${OUT}")

          check_field() {
            local field_name="$1" col_num="$2" expected="$3"
            local actual
            actual=$(echo "${DATA}" | cut -f"${col_num}")
            if [[ "${actual}" != "${expected}" ]]; then
              echo "::error::${field_name} (col ${col_num}): expected '${expected}', got '${actual}'"
              exit 1
            fi
            echo "PASS: ${field_name} = ${actual}"
          }

          # MEAN_AUTOSOMAL_COV: chr1(30×) and chr2(30×), length-weighted avg = 30.0000
          # chrX/Y/M are excluded from autosomal mean
          check_field "MEAN_AUTOSOMAL_COV" 2 "30.0000"

          # X_COV_RATIO: chrX_mean(15.00) / auto_mean(30.00) = 0.5000
          check_field "X_COV_RATIO" 3 "0.5000"

          # Y_COV_RATIO: chrY_mean(5.00) / auto_mean(30.00) = 0.1667
          check_field "Y_COV_RATIO" 4 "0.1667"

          # INFERRED_SEX: Y_ratio(0.1667)>0.1 AND X_ratio(0.5000)<0.75 → M
          check_field "INFERRED_SEX" 5 "M"

          # MITO_COV_RATIO: chrM_mean(50.00) / auto_mean(30.00) = 1.6667
          check_field "MITO_COV_RATIO" 6 "1.6667"

          # MEDIAN_GENOME_COV: last depth where cumulative fraction ≥ 0.5
          # From dist: depth=30 has fraction=0.51 ≥ 0.5; depth=31 has 0.49 < 0.5 → median=30
          check_field "MEDIAN_GENOME_COV" 7 "30"

          # PCT_GENOME_COV_10X: fraction at depth=10 (0.9500) × 100 = 95.0000
          check_field "PCT_GENOME_COV_10X" 8 "95.0000"

          # PCT_GENOME_COV_20X: fraction at depth=20 (0.9000) × 100 = 90.0000
          check_field "PCT_GENOME_COV_20X" 9 "90.0000"

          # Coverage variability columns parsed from coverage summary (cols $4,$5,$6,$3 of summary)
          check_field "SD_COV" 10 "5.1234"
          check_field "MAD_COV" 11 "3.4567"
          check_field "IQR_COV" 12 "7.8901"
          # MEDIAN_BIN_COV comes from MEDIAN_COV ($3) of the coverage summary, not SD/MAD/IQR
          check_field "MEDIAN_BIN_COV" 13 "30.0000"

          # HQ coverage columns parsed from coverage summary (cols $8,$9,$10,$11 of summary)
          check_field "HQ_MEDIAN_COV" 14 "29.0000"
          check_field "HQ_SD_COV" 15 "4.5678"
          check_field "HQ_MAD_COV" 16 "2.3456"
          check_field "HQ_IQR_COV" 17 "6.7890"

          # MTDNA_CN: 2 × chrM_mean / HQ_MEDIAN_COV
          #         = 2 × 50.00 / 29.0000 = 3.4483
          # Code path: 2 × MITO_COV_RATIO × MEAN_AUTOSOMAL_COV / HQ_MEDIAN_COV, which expands to the same
          check_field "MTDNA_CN" 18 "3.4483"

          echo ""
          echo "=== All QC table integration tests passed ==="

  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Build with Maven
        working-directory: ngspca
        run: |
          mvn -B package --file pom.xml
          cp target/ngspca-*.jar target/ngspca.jar

      - name: Run NGS-PCA (UNIFORM distribution)
        working-directory: example
        run: |
          mkdir -p test_output
          java -jar ../ngspca/target/ngspca.jar \
            -input input.files.txt \
            -outputDir test_output/ \
            -numPC 2 \
            -sampleEvery 0 \
            -iters 10 \
            -randomSeed 42 \
            -oversample 2 \
            -distribution UNIFORM \
            -bedExclude ../resources/GRCh38/ngs_pca_exclude.sv_blacklist.map.kmer.50.1.0.dgv.gsd.sorted.merge.bed.gz

      - name: Run NGS-PCA (GAUSSIAN distribution)
        working-directory: example
        run: |
          mkdir -p test_output_gaussian
          java -jar ../ngspca/target/ngspca.jar \
            -input input.files.txt \
            -outputDir test_output_gaussian/ \
            -numPC 2 \
            -sampleEvery 0 \
            -iters 10 \
            -randomSeed 42 \
            -oversample 2 \
            -distribution GAUSSIAN \
            -bedExclude ../resources/GRCh38/ngs_pca_exclude.sv_blacklist.map.kmer.50.1.0.dgv.gsd.sorted.merge.bed.gz

      - name: Generate UNIFORM vs GAUSSIAN distribution comparison
        working-directory: example
        run: |
          python3 compare_distributions.py \
            test_output/ \
            test_output_gaussian/ \
            test_output/distribution_comparison.txt

      - name: Verify output MD5 checksums
        working-directory: example
        run: |
          echo "Comparing output files against expected checksums..."
          FAILED=0
          CHECKED=0

          while IFS='  ' read -r expected_md5 filepath; do
            # Skip empty lines
            [ -z "$expected_md5" ] && continue

            # Check svd.* output files and distribution_comparison.txt
            case "$filepath" in
              ./exampleOutput_1000G_chr1/svd.*|./exampleOutput_1000G_chr1/distribution_comparison.txt)
                CHECKED=$((CHECKED + 1))
                filename=$(basename "$filepath")
                test_file="./test_output/$filename"

                if [ ! -f "$test_file" ]; then
                  echo "MISSING: $test_file"
                  FAILED=1
                  continue
                fi

                actual_md5=$(md5sum "$test_file" | awk '{print $1}')
                if [ "$actual_md5" = "$expected_md5" ]; then
                  echo "PASS: $filename ($actual_md5)"
                else
                  echo "FAIL: $filename (expected: $expected_md5, got: $actual_md5)"
                  FAILED=1
                fi
                ;;
            esac
          done < 1000G.chr1.md5

          if [ "$CHECKED" -eq 0 ]; then
            echo "::error::No output files were checked - verify MD5 file and output path patterns"
            exit 1
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::MD5 checksum verification failed"
            exit 1
          fi

          echo "All $CHECKED output checksums match expected values."

  docker-container-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ngspca:ci-test .

      - name: Verify JAR is accessible at absolute path inside container
        run: |
          docker run --rm --entrypoint java ngspca:ci-test -jar /app/ngspca.jar --help 2>&1 | head -5 || true
          # The real check: ensure the ENTRYPOINT resolves the jar correctly regardless of working directory
          docker run --rm -w /tmp ngspca:ci-test --help 2>&1 | head -5 || true

      - name: Run NGS-PCA via Docker with example data
        working-directory: example
        run: |
          mkdir -p test_output_docker
          docker run --rm \
            -v "$(pwd)/exampleMosdepth_1000G_chr1:/input:ro" \
            -v "$(pwd)/test_output_docker:/output" \
            -v "$(pwd)/../resources:/app/resources:ro" \
            -e JAVA_TOOL_OPTIONS="-Xmx2g" \
            ngspca:ci-test \
            -input /input/ \
            -outputDir /output/ \
            -numPC 2 \
            -sampleEvery 0 \
            -iters 10 \
            -randomSeed 42 \
            -oversample 2 \
            -distribution UNIFORM \
            -bedExclude /app/resources/GRCh38/ngs_pca_exclude.sv_blacklist.map.kmer.50.1.0.dgv.gsd.sorted.merge.bed.gz

      - name: Verify Docker container output files exist
        working-directory: example
        run: |
          echo "Verifying NGS-PCA Docker output files..."
          FAILED=0
          for f in svd.pcs.txt svd.loadings.txt svd.singularvalues.txt svd.bins.txt svd.samples.txt; do
            if [ -f "test_output_docker/$f" ]; then
              echo "FOUND: $f"
            else
              echo "MISSING: $f"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Docker container run failed to produce expected output files"
            exit 1
          fi
          echo "Docker container test passed — all output files present."
