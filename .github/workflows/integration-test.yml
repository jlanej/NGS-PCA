name: Integration Test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  highcov-setup-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download real IGSR NYGC 30x sequence indexes
        working-directory: example/1000G_highcov
        run: |
          set -euo pipefail
          TEST_WORK="${RUNNER_TEMP}/highcov_setup_test"
          mkdir -p "${TEST_WORK}/reference"
          # Empty placeholders — this test targets only manifest generation (step 4/5)
          touch "${TEST_WORK}/ngs-pca.sif" "${TEST_WORK}/reference/ref.fa" "${TEST_WORK}/igsr_sample_panel.ped"

          # Download the real NYGC 30x sequence indexes from EBI FTP
          echo "Downloading 2504-sample sequence index..."
          curl -sSL -o "${TEST_WORK}/1000G_2504_high_coverage.sequence.index" \
            "ftp://ftp.1000genomes.ebi.ac.uk/vol1/ftp/data_collections/1000G_2504_high_coverage/1000G_2504_high_coverage.sequence.index"
          echo "Downloading 698-sample sequence index..."
          curl -sSL -o "${TEST_WORK}/1000G_698_related_high_coverage.sequence.index" \
            "ftp://ftp.1000genomes.ebi.ac.uk/vol1/ftp/data_collections/1000G_2504_high_coverage/1000G_698_related_high_coverage.sequence.index"

          # Run 00_setup.sh with real indexes
          WORK_DIR="${TEST_WORK}" \
          SIF_IMAGE="${TEST_WORK}/ngs-pca.sif" \
          REF_DIR="${TEST_WORK}/reference" \
          REF_FASTA="${TEST_WORK}/reference/ref.fa" \
          INDEX_FILE_2504="${TEST_WORK}/1000G_2504_high_coverage.sequence.index" \
          INDEX_FILE_698="${TEST_WORK}/1000G_698_related_high_coverage.sequence.index" \
          MANIFEST="${TEST_WORK}/manifest.tsv" \
          PANEL_FILE="${TEST_WORK}/igsr_sample_panel.ped" \
          MIN_MANIFEST_SAMPLES=3000 \
          EXPECTED_MANIFEST_SAMPLES=3202 \
          bash 00_setup.sh

          SAMPLE_COUNT=$(tail -n +2 "${TEST_WORK}/manifest.tsv" | wc -l)
          echo "Manifest sample count: ${SAMPLE_COUNT}"
          if (( SAMPLE_COUNT < 3000 )); then
            echo "::error::Manifest has only ${SAMPLE_COUNT} samples (minimum expected: 3000)."
            exit 1
          fi
          echo "Manifest validation passed (${SAMPLE_COUNT} samples)."

  bas-link-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download alignment index and validate BAS URLs
        working-directory: example/1000G_highcov
        run: |
          set -euo pipefail
          TEST_WORK="${RUNNER_TEMP}/bas_link_test"
          mkdir -p "${TEST_WORK}/bas_files"

          # ── 0. Verify HTTPS alignment index URLs are accessible ──
          # These are the production URLs used by 03_collect_qc.sh (config.sh defaults).
          echo "=== Verifying HTTPS alignment index accessibility ==="
          for idx_url in \
            "https://ftp.1000genomes.ebi.ac.uk/vol1/ftp/data_collections/1000G_2504_high_coverage/1000G_2504_high_coverage.GRCh38DH.alignment.index" \
            "https://ftp.1000genomes.ebi.ac.uk/vol1/ftp/data_collections/1000G_2504_high_coverage/1000G_698_related_high_coverage.GRCh38DH.alignment.index"; do
            echo -n "  Testing: ${idx_url} ... "
            if curl -sSL --max-time 30 --head "${idx_url}" 2>/dev/null | grep -q "200"; then
              echo "accessible (HTTP 200)"
            elif curl -sSL --max-time 30 --range 0-0 -o /dev/null "${idx_url}" 2>/dev/null; then
              echo "accessible (range request)"
            elif wget --spider --timeout=30 "${idx_url}" 2>/dev/null; then
              echo "accessible (wget spider)"
            else
              echo "WARNING: could not verify (may be a transient issue)"
            fi
          done
          echo ""

          # ── 1. Download the GRCh38 high-coverage pilot alignment index (24 samples) ──
          # This is on GitHub (always accessible) and has known BAS file URLs.
          echo "=== Downloading pilot alignment index from IGSR GitHub ==="
          curl -sSL -o "${TEST_WORK}/pilot.alignment.index" \
            "https://raw.githubusercontent.com/igsr/1000Genomes_data_indexes/master/data_collections/1000_genomes_project/1000genomes.high_coverage.GRCh38DH.alignment.index"

          PILOT_LINES=$(grep -cv '^#' "${TEST_WORK}/pilot.alignment.index" || true)
          echo "Pilot alignment index: ${PILOT_LINES} entries"
          if (( PILOT_LINES < 20 )); then
            echo "::error::Pilot alignment index has too few entries (${PILOT_LINES}, expected ~24)"
            exit 1
          fi
          echo "PASS: Pilot alignment index has ${PILOT_LINES} entries"

          # ── 2. Extract BAS URLs from alignment index (column 5) ──
          echo ""
          echo "=== Extracting BAS URLs from alignment index ==="
          awk -F'\t' '
            /^#/ { next }
            $5 != "" {
              bas_url = $5
              sub(/^ftp:\/ftp\./, "ftp://ftp.", bas_url)
              n = split(bas_url, parts, "/")
              fname = parts[n]
              split(fname, namep, ".")
              sample = namep[1]
              print sample "\t" bas_url
            }
          ' "${TEST_WORK}/pilot.alignment.index" > "${TEST_WORK}/bas_urls.tsv"

          TOTAL_URLS=$(wc -l < "${TEST_WORK}/bas_urls.tsv")
          echo "Extracted ${TOTAL_URLS} BAS URLs"
          echo "First 3 entries:"
          head -3 "${TEST_WORK}/bas_urls.tsv"

          # ── 3. Verify a subset of BAS URLs are accessible ──
          echo ""
          echo "=== Verifying subset of BAS URLs are accessible ==="
          CHECKED=0
          ACCESSIBLE=0
          FAILED_URLS=()
          # Test first 5 URLs (wget --spider is more reliable for FTP URLs)
          while IFS=$'\t' read -r sample_id bas_url; do
            (( CHECKED >= 5 )) && break
            CHECKED=$(( CHECKED + 1 ))
            echo -n "  [${CHECKED}/5] ${sample_id}: "
            if wget --spider --timeout=30 "${bas_url}" 2>/dev/null; then
              echo "accessible"
              ACCESSIBLE=$(( ACCESSIBLE + 1 ))
            elif curl -sS --max-time 30 --range 0-0 -o /dev/null "${bas_url}" 2>/dev/null; then
              echo "accessible (curl)"
              ACCESSIBLE=$(( ACCESSIBLE + 1 ))
            else
              echo "FAILED"
              FAILED_URLS+=("${bas_url}")
            fi
          done < "${TEST_WORK}/bas_urls.tsv"

          echo ""
          echo "URL check: ${ACCESSIBLE}/${CHECKED} accessible"
          if (( ACCESSIBLE == 0 )); then
            echo "::error::No BAS URLs were accessible. Network issue or URLs are invalid."
            exit 1
          fi
          echo "PASS: At least ${ACCESSIBLE} BAS URLs are accessible"

          # ── 4. Download a few BAS files and validate format ──
          echo ""
          echo "=== Downloading and validating BAS file format ==="
          DOWNLOADED=0
          VALID=0
          while IFS=$'\t' read -r sample_id bas_url; do
            (( DOWNLOADED >= 3 )) && break
            dest="${TEST_WORK}/bas_files/${sample_id}.bam.bas"
            echo -n "  Downloading ${sample_id}.bam.bas... "
            if curl -sS --max-time 60 -o "${dest}" "${bas_url}" 2>/dev/null && [ -s "${dest}" ]; then
              echo "OK ($(wc -c < "${dest}") bytes)"
              DOWNLOADED=$(( DOWNLOADED + 1 ))

              # Validate: must be tab-separated with >= 21 columns
              NCOLS=$(head -1 "${dest}" | awk -F'\t' '{print NF}')
              NROWS=$(wc -l < "${dest}")
              echo "    Columns: ${NCOLS}, Rows: ${NROWS}"

              if (( NCOLS >= 21 )); then
                echo "    PASS: Standard 21-column BAS format"
                VALID=$(( VALID + 1 ))
              else
                echo "    WARNING: Expected >= 21 columns, got ${NCOLS}"
              fi

              # Show header
              echo "    Header fields:"
              head -1 "${dest}" | tr '\t' '\n' | head -10 | sed 's/^/      /'
              echo "      ..."
            elif wget -q --timeout=60 -O "${dest}" "${bas_url}" 2>/dev/null && [ -s "${dest}" ]; then
              echo "OK via wget ($(wc -c < "${dest}") bytes)"
              DOWNLOADED=$(( DOWNLOADED + 1 ))
              NCOLS=$(head -1 "${dest}" | awk -F'\t' '{print NF}')
              if (( NCOLS >= 21 )); then
                VALID=$(( VALID + 1 ))
              fi
            else
              echo "FAILED"
              rm -f "${dest}"
            fi
          done < "${TEST_WORK}/bas_urls.tsv"

          echo ""
          echo "Downloaded: ${DOWNLOADED}, Valid format: ${VALID}"
          if (( DOWNLOADED == 0 )); then
            echo "::error::Could not download any BAS files"
            exit 1
          fi
          echo "PASS: Successfully downloaded and validated ${VALID} BAS files"

          # ── 5. Test parse_bas_file() with real data ──
          echo ""
          echo "=== Testing parse_bas_file() with downloaded BAS files ==="
          # Extract the parse function from 03_collect_qc.sh and test it
          for bas_file in "${TEST_WORK}"/bas_files/*.bam.bas; do
            [ -f "${bas_file}" ] || continue
            fname=$(basename "${bas_file}")
            echo "  Parsing ${fname}:"
            result=$(awk 'BEGIN { FS="\t"; OFS="\t"
              total_bases_col=8; mapped_bases_col=9; total_reads_col=10; mapped_reads_col=11
              paired_col=12; proper_col=13; mismatch_col=14; avgqual_col=15
              ins_mean_col=16; ins_sd_col=17; ins_med_col=18; ins_mad_col=19
              dup_reads_col=20; dup_bases_col=21
            }
            NR == 1 {
              if ($1 ~ /[a-zA-Z]/ && $1 !~ /\.bam$/ && $1 !~ /\.cram$/ && $1 !~ /^\//) {
                for (i = 1; i <= NF; i++) {
                  h = tolower($i); gsub(/^#/, "", h)
                  if (h == "_total_bases" || h == "total_bases")           total_bases_col = i
                  if (h == "_mapped_bases" || h == "mapped_bases")         mapped_bases_col = i
                  if (h == "_total_reads" || h == "total_reads")           total_reads_col = i
                  if (h == "_mapped_reads" || h == "mapped_reads")         mapped_reads_col = i
                  if (h == "_mapped_reads_paired_in_sequencing" || h == "mapped_reads_paired_in_sequencing")   paired_col = i
                  if (h == "_mapped_reads_properly_paired" || h == "mapped_reads_properly_paired")             proper_col = i
                  if (h == "%_of_mismatched_bases" || h == "of_mismatched_bases" || h == "mismatched_bases")   mismatch_col = i
                  if (h == "average_quality_of_mapped_bases" || h == "avg_quality_mapped_bases")               avgqual_col = i
                  if (h == "mean_insert_size")                             ins_mean_col = i
                  if (h == "insert_size_sd")                               ins_sd_col = i
                  if (h == "median_insert_size")                           ins_med_col = i
                  if (h == "insert_size_median_absolute_deviation" || h == "insert_size_mad") ins_mad_col = i
                  if (h == "_duplicate_reads" || h == "duplicate_reads")   dup_reads_col = i
                  if (h == "_duplicate_bases" || h == "duplicate_bases")   dup_bases_col = i
                }
                next
              }
            }
            {
              nrg++
              s_total_bases   += ($total_bases_col + 0); s_mapped_bases  += ($mapped_bases_col + 0)
              s_total_reads   += ($total_reads_col + 0); s_mapped_reads  += ($mapped_reads_col + 0)
              s_paired += ($paired_col + 0); s_proper += ($proper_col + 0)
              s_dup_reads += ($dup_reads_col + 0); s_dup_bases += ($dup_bases_col + 0)
              if ($mismatch_col + 0 > 0 || $mismatch_col == "0") { s_mismatch += ($mismatch_col + 0); n_mismatch++ }
              if ($avgqual_col + 0 > 0 || $avgqual_col == "0")   { s_avgqual  += ($avgqual_col + 0); n_avgqual++ }
              if ($ins_mean_col + 0 > 0 || $ins_mean_col == "0") { s_ins_mean += ($ins_mean_col + 0); n_ins_mean++ }
              if ($ins_sd_col + 0 > 0 || $ins_sd_col == "0")     { s_ins_sd += ($ins_sd_col + 0); n_ins_sd++ }
              if ($ins_med_col + 0 > 0 || $ins_med_col == "0")   { s_ins_med += ($ins_med_col + 0); n_ins_med++ }
              if ($ins_mad_col + 0 > 0 || $ins_mad_col == "0")   { s_ins_mad += ($ins_mad_col + 0); n_ins_mad++ }
            }
            END {
              if (nrg == 0) { printf "NA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\n"; exit }
              pct_mapped = (s_total_bases > 0) ? sprintf("%.4f", s_mapped_bases / s_total_bases * 100) : "NA"
              pct_dup = (s_mapped_bases > 0) ? sprintf("%.4f", s_dup_bases / s_mapped_bases * 100) : "NA"
              mismatch = (n_mismatch > 0) ? sprintf("%.2f", s_mismatch / n_mismatch) : "NA"
              avgqual  = (n_avgqual > 0)  ? sprintf("%.2f", s_avgqual / n_avgqual) : "NA"
              ins_mean = (n_ins_mean > 0) ? sprintf("%.0f", s_ins_mean / n_ins_mean) : "NA"
              ins_sd   = (n_ins_sd > 0)   ? sprintf("%.2f", s_ins_sd / n_ins_sd) : "NA"
              ins_med  = (n_ins_med > 0)  ? sprintf("%.0f", s_ins_med / n_ins_med) : "NA"
              ins_mad  = (n_ins_mad > 0)  ? sprintf("%.0f", s_ins_mad / n_ins_mad) : "NA"
              printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n", \
                s_total_bases, s_mapped_bases, s_total_reads, s_mapped_reads, \
                s_paired, s_proper, mismatch, avgqual, \
                ins_mean, ins_sd, ins_med, ins_mad, \
                s_dup_reads, s_dup_bases, pct_mapped, pct_dup
            }' "${bas_file}")

            NCOLS=$(echo "${result}" | awk -F'\t' '{print NF}')
            echo "    Output: ${NCOLS} fields"
            echo "    Values: ${result}"

            # Verify we got 16 non-empty fields
            NA_COUNT=$(echo "${result}" | tr '\t' '\n' | grep -c '^NA$' || true)
            if (( NCOLS != 16 )); then
              echo "::error::parse_bas_file produced ${NCOLS} fields (expected 16) for ${fname}"
              exit 1
            fi
            # With real data, total_bases should not be NA or 0
            TOTAL_BASES=$(echo "${result}" | cut -f1)
            if [[ "${TOTAL_BASES}" == "NA" || "${TOTAL_BASES}" == "0" ]]; then
              echo "::error::parse_bas_file returned TOTAL_BASES=${TOTAL_BASES} for ${fname}"
              exit 1
            fi
            echo "    PASS: 16 fields, TOTAL_BASES=${TOTAL_BASES}"
          done

          echo ""
          echo "=== All BAS link and format validations passed ==="

  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Build with Maven
        working-directory: ngspca
        run: |
          mvn -B package --file pom.xml
          cp target/ngspca-*.jar target/ngspca.jar

      - name: Run NGS-PCA (UNIFORM distribution)
        working-directory: example
        run: |
          mkdir -p test_output
          java -jar ../ngspca/target/ngspca.jar \
            -input input.files.txt \
            -outputDir test_output/ \
            -numPC 2 \
            -sampleEvery 0 \
            -iters 10 \
            -randomSeed 42 \
            -oversample 2 \
            -distribution UNIFORM \
            -bedExclude ../resources/GRCh38/ngs_pca_exclude.sv_blacklist.map.kmer.50.1.0.dgv.gsd.sorted.merge.bed.gz

      - name: Run NGS-PCA (GAUSSIAN distribution)
        working-directory: example
        run: |
          mkdir -p test_output_gaussian
          java -jar ../ngspca/target/ngspca.jar \
            -input input.files.txt \
            -outputDir test_output_gaussian/ \
            -numPC 2 \
            -sampleEvery 0 \
            -iters 10 \
            -randomSeed 42 \
            -oversample 2 \
            -distribution GAUSSIAN \
            -bedExclude ../resources/GRCh38/ngs_pca_exclude.sv_blacklist.map.kmer.50.1.0.dgv.gsd.sorted.merge.bed.gz

      - name: Generate UNIFORM vs GAUSSIAN distribution comparison
        working-directory: example
        run: |
          python3 compare_distributions.py \
            test_output/ \
            test_output_gaussian/ \
            test_output/distribution_comparison.txt

      - name: Verify output MD5 checksums
        working-directory: example
        run: |
          echo "Comparing output files against expected checksums..."
          FAILED=0
          CHECKED=0

          while IFS='  ' read -r expected_md5 filepath; do
            # Skip empty lines
            [ -z "$expected_md5" ] && continue

            # Check svd.* output files and distribution_comparison.txt
            case "$filepath" in
              ./exampleOutput_1000G_chr1/svd.*|./exampleOutput_1000G_chr1/distribution_comparison.txt)
                CHECKED=$((CHECKED + 1))
                filename=$(basename "$filepath")
                test_file="./test_output/$filename"

                if [ ! -f "$test_file" ]; then
                  echo "MISSING: $test_file"
                  FAILED=1
                  continue
                fi

                actual_md5=$(md5sum "$test_file" | awk '{print $1}')
                if [ "$actual_md5" = "$expected_md5" ]; then
                  echo "PASS: $filename ($actual_md5)"
                else
                  echo "FAIL: $filename (expected: $expected_md5, got: $actual_md5)"
                  FAILED=1
                fi
                ;;
            esac
          done < 1000G.chr1.md5

          if [ "$CHECKED" -eq 0 ]; then
            echo "::error::No output files were checked - verify MD5 file and output path patterns"
            exit 1
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::MD5 checksum verification failed"
            exit 1
          fi

          echo "All $CHECKED output checksums match expected values."

  docker-container-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ngspca:ci-test .

      - name: Verify JAR is accessible at absolute path inside container
        run: |
          docker run --rm --entrypoint java ngspca:ci-test -jar /app/ngspca.jar --help 2>&1 | head -5 || true
          # The real check: ensure the ENTRYPOINT resolves the jar correctly regardless of working directory
          docker run --rm -w /tmp ngspca:ci-test --help 2>&1 | head -5 || true

      - name: Run NGS-PCA via Docker with example data
        working-directory: example
        run: |
          mkdir -p test_output_docker
          docker run --rm \
            -v "$(pwd)/exampleMosdepth_1000G_chr1:/input:ro" \
            -v "$(pwd)/test_output_docker:/output" \
            -v "$(pwd)/../resources:/app/resources:ro" \
            -e JAVA_TOOL_OPTIONS="-Xmx2g" \
            ngspca:ci-test \
            -input /input/ \
            -outputDir /output/ \
            -numPC 2 \
            -sampleEvery 0 \
            -iters 10 \
            -randomSeed 42 \
            -oversample 2 \
            -distribution UNIFORM \
            -bedExclude /app/resources/GRCh38/ngs_pca_exclude.sv_blacklist.map.kmer.50.1.0.dgv.gsd.sorted.merge.bed.gz

      - name: Verify Docker container output files exist
        working-directory: example
        run: |
          echo "Verifying NGS-PCA Docker output files..."
          FAILED=0
          for f in svd.pcs.txt svd.loadings.txt svd.singularvalues.txt svd.bins.txt svd.samples.txt; do
            if [ -f "test_output_docker/$f" ]; then
              echo "FOUND: $f"
            else
              echo "MISSING: $f"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Docker container run failed to produce expected output files"
            exit 1
          fi
          echo "Docker container test passed — all output files present."
